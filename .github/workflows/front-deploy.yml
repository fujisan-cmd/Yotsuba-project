name: Build and deploy Node.js app to Azure Web App app-002-step3-2-node-oshima13

on:
  push:
    branches:
      - frontend2
  workflow_dispatch:

jobs:
  front-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        env:
          NEXT_PUBLIC_API_ENDPOINT: ${{ secrets.NEXT_PUBLIC_API_ENDPOINT }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
        working-directory: ./frontend

      - name: Copy artifact for deployment job
        run: |
          mkdir deploy
          cp -r frontend/.next/standalone/. ./deploy
          cp -r frontend/.next/static/. ./deploy/.next/static
          cp -r frontend/public/. ./deploy/public
        working-directory: .

      - name: Zip artifact for deployment
        run: zip release.zip ./deploy -r
        working-directory: .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./release.zip

  front-deploy:
    runs-on: ubuntu-latest
    needs: front-build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-002-step3-2-node-oshima13'
          slot-name: 'Production'
          package: ./deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7003EB75F42A49C3AC9AD388F476A3A1 }}
